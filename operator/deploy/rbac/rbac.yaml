apiVersion: v1
kind: ServiceAccount
metadata:
  name: qrmi-operator
  namespace: platform-qrmi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: qrmi-operator
rules:
  # Manage QuantumResources (cluster-scoped)
  - apiGroups: ["quantum.qrmi.io"]
    resources: ["quantumresources"]
    verbs: ["get", "list", "watch"]
  # Manage QuantumResourceClaims
  - apiGroups: ["quantum.qrmi.io"]
    resources: ["quantumresourceclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["quantum.qrmi.io"]
    resources: ["quantumresourceclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["quantum.qrmi.io"]
    resources: ["quantumresourceclaims/finalizers"]
    verbs: ["update"]
  # Manage Jobs (read + patch for suspend/envFrom injection)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Watch Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Manage the credential Secrets the operator creates
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read admin-provided backend credential Secrets
  # (scoped by namespace via RoleBinding in operator namespace)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: qrmi-operator
subjects:
  - kind: ServiceAccount
    name: qrmi-operator
    namespace: platform-qrmi
roleRef:
  kind: ClusterRole
  name: qrmi-operator
  apiGroup: rbac.authorization.k8s.io
