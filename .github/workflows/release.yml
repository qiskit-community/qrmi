# This workflow creates a new QRMI release.
#
# Requires:
# - GITHUB_TOKEN secret
#
# Release assets:
# - qrmi-{version}-vendor.tar.gz
# - libqrmi-{version}-el8-x86_64.tar.gz

name: Release
on:
  workflow_dispatch:
  
jobs:
  valid-qrmi-version:
    if: github.repository_owner == 'qiskit-community'
    name: Check new QRMI version is valid
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.qrmi-info.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ubuntu runner already comes with the package make installed

      - name: Check the new QRMI version is valid
        run: make check-new-qrmi-version-valid

      - name: Get QRMI information
        id: qrmi-info
        run: |
          QRMI_VERSION=$(make get-qrmi-version)
          echo "version=$QRMI_VERSION" >> $GITHUB_OUTPUT
          echo "QRMI version: $QRMI_VERSION"

  create-vendor-tarball:
    if: github.repository_owner == 'qiskit-community'
    name: Create vendor tarball
    needs: [valid-qrmi-version]
    uses: ./.github/workflows/tarball-vendor.yml

  create-libqrmi-tarball-rhel:
    if: github.repository_owner == 'qiskit-community'
    name: Create libqrmi tarball for RHEL compatible distributions
    uses: ./.github/workflows/tarball-libqrmi-el8.yml
      
  create-draft-release:
    if: github.repository_owner == 'qiskit-community'
    name: Create draft release and populate it with assets
    needs: [valid-qrmi-version, create-vendor-tarball, create-libqrmi-tarball-rhel]
    permissions:
      contents: write # required to create a draft release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create --draft --generate-notes --title "QRMI v${{ needs.valid-qrmi-version.outputs.version }}" "v${{ needs.valid-qrmi-version.outputs.version }}"
  
      - name: Download vendor tarball
        uses: actions/download-artifact@v4
        with:
          name: qrmi-vendor-tarball

      - name: Upload vendor tarball
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.valid-qrmi-version.outputs.version }}" qrmi-${{ needs.valid-qrmi-version.outputs.version }}-vendor.tar.gz --clobber

      - name: Download libqrmi tarball for RHEL compatible distributions
        uses: actions/download-artifact@v4
        with:
          name: libqrmi-${{ needs.valid-qrmi-version.outputs.version }}-el8-x86_64-tarball

      - name: Upload libqrmi tarball for RHEL compatible distributions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.valid-qrmi-version.outputs.version }}" libqrmi-${{ needs.valid-qrmi-version.outputs.version }}-el8-x86_64.tar.gz --clobber
    
  publish-release:
    if: github.repository_owner == 'qiskit-community'
    name: Publish release
    needs: [valid-qrmi-version, create-draft-release]
    permissions:
      contents: write # This is required to publish the draft release
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Publish release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Make the release live on github
        gh release edit "v${{ needs.valid-qrmi-version.outputs.version }}" --verify-tag --draft=false
