# This workflow creates a new QRMI release.
#
# Requires:
# - GITHUB_TOKEN secret
#
# Release assets:
# - qrmi-{version}-vendor.tar.gz
# - libqrmi-{version}-el8-x86_64.tar.gz

name: Release
on:
  workflow_dispatch:
  
jobs:
  valid-qrmi-version:
    if: github.repository_owner == 'qiskit-community'
    name: Check new QRMI version is valid
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.qrmi-info.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ubuntu runner already comes with the package make installed

      - name: Check the new QRMI version is valid
        run: make check-new-qrmi-version-valid

      - name: Get QRMI information
        id: qrmi-info
        run: |
          QRMI_VERSION=$(make get-qrmi-version)
          echo "version=$QRMI_VERSION" >> $GITHUB_OUTPUT
          echo "QRMI version: $QRMI_VERSION"

  create-vendor-tarball:
    if: github.repository_owner == 'qiskit-community'
    name: Create vendor tarball
    needs: [valid-qrmi-version]
    uses: ./.github/workflows/tarball-vendor.yml

  create-libqrmi-tarball-rhel:
    if: github.repository_owner == 'qiskit-community'
    name: Create libqrmi tarball for RHEL compatible distributions
    uses: ./.github/workflows/libqrmi-tarball-rhel.yml
      
  create-draft-release:
    if: github.repository_owner == 'qiskit-community'
    name: Create draft release and populate it with assets
    needs: [valid-qrmi-version, create-vendor-tarball, create-libqrmi-tarball-rhel]
    permissions:
      contents: write # required to create a draft release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create --draft --generate-notes --title "QRMI v${{ needs.valid-qrmi-version.outputs.version }}" "v${{ needs.valid-qrmi-version.outputs.version }}"
  
      - name: Download vendor tarball
        uses: actions/download-artifact@v4
        with:
          name: qrmi-vendor-tarball

      - name: Upload vendor tarball
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.valid-qrmi-version.outputs.version }}" qrmi-${{ needs.valid-qrmi-version.outputs.version }}-vendor.tar.gz --clobber

      - name: Download libqrmi tarball for RHEL compatible distributions
        uses: actions/download-artifact@v4
        with:
          name: libqrmi-${{ needs.valid-qrmi-version.outputs.version }}-el8-x86_64-tarball

      - name: Upload libqrmi tarball for RHEL compatible distributions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.valid-qrmi-version.outputs.version }}" libqrmi-${{ needs.valid-qrmi-version.outputs.version }}-el8-x86_64.tar.gz --clobber
    
  publish-github:
    if: github.repository_owner == 'qiskit-community'
    name: Publish github release
    needs: [valid-qrmi-version, create-draft-release, test-testpypi-release]
    permissions:
      contents: write # This is required to publish the draft release
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Publish release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Make the release live on github
        gh release edit "v${{ needs.valid-qrmi-version.outputs.version }}" --verify-tag --draft=false

  linux-wheel-x86_64:
    if: github.repository_owner == 'qiskit-community'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: x86_64
        manylinux: 2_28   # manylinux_2_28 is based on Almalinux 8
        command: build
        args: --release --locked -o dist --compatibility pypi -i python3.12
    - name: Upload QRMI wheels
      uses: actions/upload-artifact@v7
      if: ${{ success() }}
      with:
        name: pypi-linux-x86_64
        path: dist/qrmi-*.whl
        if-no-files-found: error
        retention-days: 1

  linux-sdist:
    if: github.repository_owner == 'qiskit-community'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build sdist
      uses: PyO3/maturin-action@v1
      with:
        target: x86_64
        manylinux: 2_28
        command: sdist
        args: --out dist
    - name: Upload QRMI sdist
      uses: actions/upload-artifact@v7
      if: ${{ success() }}
      with:
        name: pypi-dist
        path: dist/qrmi-*.tar.gz
        if-no-files-found: error
        retention-days: 1

  publish-testpypi:
    if: github.repository_owner == 'qiskit-community'
    needs: [linux-wheel-x86_64, linux-sdist]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/qrmi/
    permissions:
      id-token: write  # IMPORTANN: this permission is mandatory for trusted publishing
    steps:
    - uses: actions/download-artifact@v8
      with:
        pattern: pypi-*
        merge-multiple: true
        path: dist/
    - name: Publish QRMI wheels
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true
        print-hash: true

  test-testpypi-release:
    if: github.repository_owner == 'qiskit-community'
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Test published wheel
      run: |
        python3.12 -m venv .venv_py312
        source .venv_py312/bin/activate
        pip install --upgrade pip
        pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ qrmi
        pip download --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ qrmi --no-binary qrmi --no-deps
        mkdir qrmi && cd qrmi
        tar xf ../qrmi-*.tar.gz --strip-components=1
        pip install pytest
        pytest

