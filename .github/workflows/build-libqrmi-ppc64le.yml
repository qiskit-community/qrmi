---
# This workflow builds the libqrmi on ppc64le

name: ubuntu-24.04-ppc64le-libqrmi
on:
  [push, pull_request, workflow_dispatch]

jobs:
  linux-libqrmi-ppc64le:
    runs-on: ubuntu-24.04-ppc64le
    container:
      image: quay.io/pypa/manylinux_2_28_ppc64le:latest
    steps:
    - uses: actions/checkout@v6

    - name: Check arch
      run: |
        current_arch=$(uname -m)
        echo "arch = ${current_arch}"

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1.15.4

    # --all-targets does not include the binaries, hence they need
    # to be built separately
    - name: Build libqrmi.so
      run: cargo build --all-targets --release

    # Upload artifacts to help developers with testing/debugging in their local environment
    - name: Upload libqrmi qrmi.h and librqmi.so
      uses: actions/upload-artifact@v6
      if: ${{ success() }}
      with:
        name: libqrmi-artifacts
        path: |
          target/release/libqrmi.so
          qrmi.h
        if-no-files-found: error
        retention-days: 5
