---
# Workflow that builds Sphinx documentation and deploys it to GitHub Pages.

name: Sphinx Documentation

on:
  push:
    branches:
      - main
      - sphinx-integration
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs,all]

      - name: Build Python API documentation
        run: |
          sphinx-apidoc --no-toc -o docs/api/python/ python/qrmi/

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Rust API documentation
        run: |
          cargo doc --no-deps

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Generate Doxygen XML
        run: |
          mkdir -p build/doxygen
          doxygen Doxyfile

      - name: Build Sphinx documentation
        run: |
          sphinx-build -j auto -b html docs docs/_build/html

      - name: Add Rust API documentation to Sphinx
        run: |
          mkdir -p docs/_build/html/rust
          cp -R target/doc/* docs/_build/html/rust/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

