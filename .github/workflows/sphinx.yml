---
# Workflow that builds Sphinx documentation and deploys it to GitHub Pages.

name: Sphinx Documentation

on:
  pull_request:
    paths:
      - "docs/**"
      - "python/**"
      - "Cargo.toml"
      - "Doxyfile"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Build Python API documentation
        run: |
          sphinx-apidoc --no-toc -o docs/api/python/ python/qrmi/

      - name: Verify Python API documentation
        run: |
          test "$(find docs/api/python -name '*.rst' | wc -l)" -gt 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Rust API documentation
        run: |
          cargo doc --no-deps

      - name: Verify Rust API documentation
        run: |
          test -f target/doc/qrmi/index.html

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Generate Doxygen XML
        run: |
          mkdir -p build/doxygen
          doxygen Doxyfile

      - name: Verify Doxygen XML
        run: |
          test -s build/doxygen/xml/index.xml

      - name: Build Sphinx documentation
        run: |
          sphinx-build \
            --keep-going \
            -b html \
            -j auto \
            docs docs/_build/html

      - name: Check Sphinx documentation links
        continue-on-error: true
        run: |
          sphinx-build \
            -W \
            -b linkcheck \
            docs docs/_build/linkcheck

      - name: Add Rust API documentation to Sphinx
        run: |
          mkdir -p docs/_build/html/rust
          cp -R target/doc/* docs/_build/html/rust/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Upload linkcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkcheck-report
          path: docs/_build/linkcheck/

  deploy:
    if: github.event_name == 'push' &&
        github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

