# (C) Copyright IBM Corporation 2026

# This reusable workflow creates and upload the vendor tarball
# in preparation for a new QRMI release.
#
# Workflow inputs:
# - None
#
# Workflow artifacts uploaded:
# - qrmi-vendor-tarball
#
# Workflow dependencies:
# - None. It does not depend on any other workflow.

name: Create and upload the vendor tarball
on:
  workflow_call:
jobs:
  vendor-tarball:
    runs-on: ubuntu-24.04
    container:
      image: 'registry.access.redhat.com/ubi8/ubi:8.10'
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install package dependencies from distro
      run: xargs dnf install -y < requirements-distro.txt

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Get QRMI information
      id: qrmi-info
      run: |
        QRMI_VERSION=$(make get-qrmi-version)
        echo "version=$QRMI_VERSION" >> $GITHUB_OUTPUT
        echo "QRMI version: $QRMI_VERSION"

    - name: Create vendor tarball
      run: make tarball-vendor

    - name: Upload vendor tarball
      uses: actions/upload-artifact@v7
      with:
        name: qrmi-vendor-tarball
        path: qrmi-${{ steps.qrmi-info.outputs.version }}-vendor.tar.gz
        if-no-files-found: error
